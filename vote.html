<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote - UPick</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="images/Collective.jpg" type="image/jpeg">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <img src="images/Collective.jpg" alt="UPick Logo" class="logo-img">
                <h1><a href="index.html">UPick</a></h1>
            </div>
            <nav class="nav">
                <ul class="nav-list">
                    <li><a href="index.html" class="nav-link">Home</a></li>
                    <li><a href="help.html" class="nav-link">Help</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="vote-page">
                <h1 id="voteTitle">Voting Room</h1>
                <p id="voteSubtitle">Cast one vote for this decision.</p>
                
                <div class="vote-info">
                    <p><strong>Your Name:</strong> <input type="text" id="voterName" class="vote-name-field" placeholder="Enter your name"></p>
                    <p><strong>Status:</strong> <span id="decisionStatus">Loading decision...</span></p>
                </div>

                <div class="vote-visual">
                    <img src="images/luckywheel.png" alt="Decision Wheel" class="vote-wheel">
                    <p><em>Make your choice count!</em></p>
                </div>
                
                <div class="vote-options">
                    <h2>Choose One Option:</h2>
                    <div id="optionsContainer"></div>
                </div>

                <button id="submitVote" class="btn btn-primary" disabled>Submit Vote</button>
                
                <div class="voting-note">
                    <p><em>Vote once per participant name. Tallies refresh after each submission.</em></p>
                    <p><a href="index.html">← Back to Home</a> | <a href="help.html">Need Help?</a></p>
                </div>
            </div>
        </div>
    </main>

    <script src="js/vote.js"></script>
</body>
</html>
