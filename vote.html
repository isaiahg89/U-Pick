<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote - UPick</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="images/Collective.jpg" type="image/jpeg">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <img src="images/Collective.jpg" alt="UPick Logo" class="logo-img">
                <h1><a href="index.html">UPick</a></h1>
            </div>
            <nav class="nav">
                <ul class="nav-list">
                    <li><a href="index.html" class="nav-link">Home</a></li>
                    <li><a href="help.html" class="nav-link">Help</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="vote-page">
                <h1 id="voteTitle">Voting Room</h1>
                <p id="voteSubtitle">Cast one vote for this decision.</p>
                
                <div class="vote-info">
                    <p><strong>Your Name:</strong> <input type="text" id="voterName" class="vote-name-field" placeholder="Enter your name"></p>
                    <p><strong>Status:</strong> <span id="decisionStatus">Loading decision...</span></p>
                </div>

                <div class="vote-visual">
                    <img src="images/luckywheel.png" alt="Decision Wheel" class="vote-wheel">
                    <p><em>Make your choice count!</em></p>
                </div>
                
                <div class="vote-options">
                    <h2>Choose One Option:</h2>
                    <div id="optionsContainer"></div>
                </div>

                <button id="submitVote" class="btn btn-primary" disabled>Submit Vote</button>
                
                <div class="voting-note">
                    <p><em>Vote once per participant name. Tallies refresh after each submission.</em></p>
                    <p><a href="index.html">← Back to Home</a> | <a href="help.html">Need Help?</a></p>
                </div>
            </div>
        </div>
    </main>

    <script>
        function resolveApiBase() {
            const { protocol, hostname, port } = window.location;

            if (protocol === 'file:') {
                return 'http://localhost:3000/api/decisions';
            }

            if ((hostname === 'localhost' || hostname === '127.0.0.1') && port && port !== '3000') {
                return `http://${hostname}:3000/api/decisions`;
            }

            return '/api/decisions';
        }

        async function request(url, options = {}) {
            const response = await fetch(url, {
                headers: {
                    'Content-Type': 'application/json',
                    ...(options.headers || {})
                },
                ...options
            });

            let payload = null;
            try {
                payload = await response.json();
            } catch (_error) {
                payload = null;
            }

            if (!response.ok) {
                const message = payload && payload.message ? payload.message : 'Request failed';
                const details = payload && payload.error ? payload.error : '';
                throw new Error(details ? `${message}: ${details}` : message);
            }

            return payload;
        }

        function getDecisionId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('decisionId');
        }

        function normalizeVotes(decision) {
            const votes = decision.votes || {};
            const normalized = votes instanceof Map ? Object.fromEntries(votes) : { ...votes };

            (decision.options || []).forEach((option) => {
                if (typeof normalized[option] !== 'number') {
                    normalized[option] = 0;
                }
            });

            return normalized;
        }

        function renderDecision(decision) {
            document.getElementById('voteTitle').textContent = decision.title;
            document.getElementById('voteSubtitle').textContent = `Mode: ${decision.selectionMode === 'vote' ? 'Voting' : 'Random'} | Target: ${decision.tallyTarget} tallies`;
            document.getElementById('decisionStatus').textContent = `${decision.status} | ${decision.participants.length}/${decision.maxParticipants} participants`;

            const votes = normalizeVotes(decision);
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            decision.options.forEach((option, index) => {
                const optionEl = document.createElement('div');
                optionEl.className = 'option';
                optionEl.innerHTML = `
                    <label>
                        <input type="radio" name="choice" value="${option}" ${index === 0 ? 'checked' : ''}>
                        <strong>${option}</strong> (${votes[option] || 0} votes)
                    </label>
                `;
                optionsContainer.appendChild(optionEl);
            });

            const radioButtons = document.querySelectorAll('input[name="choice"]');
            radioButtons.forEach((radio) => {
                radio.addEventListener('change', updateSubmitButton);
            });

            updateSubmitButton();
        }

        const nameInput = document.getElementById('voterName');
        const submitButton = document.getElementById('submitVote');
        const apiBase = resolveApiBase();
        const decisionId = getDecisionId();
        let currentDecision = null;

        function updateSubmitButton() {
            const hasName = nameInput.value.trim() !== '';
            const hasChoice = document.querySelector('input[name="choice"]:checked') !== null;
            const canVote = currentDecision && currentDecision.status === 'active' && currentDecision.selectionMode === 'vote';
            submitButton.disabled = !(hasName && hasChoice && canVote);
        }

        nameInput.addEventListener('input', updateSubmitButton);

        submitButton.addEventListener('click', async function() {
            const name = nameInput.value.trim();
            const choice = document.querySelector('input[name="choice"]:checked');
            
            if (!name || !choice || !currentDecision) {
                return;
            }

            try {
                const updated = await request(`${apiBase}/${decisionId}/vote`, {
                    method: 'POST',
                    body: JSON.stringify({ voterName: name, option: choice.value })
                });

                currentDecision = updated;
                renderDecision(currentDecision);
                submitButton.textContent = 'Vote Submitted!';

                const noteDiv = document.querySelector('.voting-note');
                noteDiv.innerHTML = `
                    <p><strong>Vote recorded for ${name}.</strong></p>
                    <p><a href="index.html">← Back to Home</a> | <a href="vote.html?decisionId=${encodeURIComponent(decisionId)}">Refresh Room</a></p>
                `;
            } catch (error) {
                alert(error.message);
            }
        });

        // Load name from localStorage if available
        const savedName = localStorage.getItem('userName');
        if (savedName) {
            nameInput.value = savedName;
            updateSubmitButton();
        }

        async function initVotingRoom() {
            if (!decisionId) {
                document.getElementById('decisionStatus').textContent = 'Missing decision ID';
                document.getElementById('voteSubtitle').textContent = 'Open this page from a decision card on Home.';
                submitButton.disabled = true;
                return;
            }

            try {
                const decision = await request(`${apiBase}/${decisionId}`);
                currentDecision = decision;

                if (decision.selectionMode !== 'vote') {
                    document.getElementById('decisionStatus').textContent = 'This decision uses random mode';
                    document.getElementById('voteSubtitle').textContent = 'Go back to Home and use Random Pick.';
                    submitButton.disabled = true;
                    return;
                }

                renderDecision(decision);
            } catch (error) {
                document.getElementById('decisionStatus').textContent = `Unable to load decision: ${error.message}`;
                submitButton.disabled = true;
            }
        }

        initVotingRoom();
    </script>
</body>
</html>
